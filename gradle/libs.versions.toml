[versions]
agp = "9.0.1"
spotless = "8.3.0"
junit = "4.13.2"
androidx-test-ext-junit = "1.3.0"
androidx-test-runner = "1.7.0"

[libraries]
junit = { group = "junit", name = "junit", version.ref = "junit" }
